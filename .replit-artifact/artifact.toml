kind = "mobile"
previewPath = "/"
title = "PranaSync Balance"
version = "1.0.0"
id = "artifacts/pranasync"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21725

[services.development]
run = "pnpm --filter @workspace/pranasync run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pranasync", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pranasync", "run", "serve" ]

[services.env]
PORT = "21725"
BASE_PATH = "/"
